name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate required files
        shell: bash
        run: |
          test -s index.html
          test -s login.html
          test -s admin.html
          test -s case-souzas-dev.html
          test -s assets/icons/favicon.svg

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          for file in js/*.js; do
            echo "Checking $file"
            node --check "$file"
          done
